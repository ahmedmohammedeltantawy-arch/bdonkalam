<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة بدون كلام - النسخة المصرية</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --dark-color: #292f36;
            --light-color: #f7fff7;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-color);
            color: var(--light-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.2em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team h3 {
            margin: 0 0 10px 0;
            color: var(--secondary-color);
        }

        .score {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .score-btns {
            display: flex;
            gap: 5px;
        }

        .score-btn {
            padding: 8px 12px;
            font-size: 0.9em;
            border-radius: 5px;
            background-color: #fca311;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .score-btn.minus {
            background-color: #e63946;
            color: white;
        }

        /* Difficulty Selector */
        .difficulty-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }

        .diff-label {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
            font-weight: bold;
        }

        .diff-label input {
            display: none;
        }

        .diff-label.active-easy { background: #4caf50; color: white; }
        .diff-label.active-medium { background: #ff9800; color: white; }
        .diff-label.active-hard { background: #f44336; color: white; }

        /* Game Area Styles */
        .display-area {
            background-color: var(--light-color);
            color: var(--dark-color);
            padding: 25px 20px;
            border-radius: 15px;
            margin: 15px 0;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        #category-label {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #word-display {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--secondary-color);
            color: var(--dark-color);
            border: none;
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover { background-color: #45b7af; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .random-btn { background-color: var(--primary-color); color: white; grid-column: 1 / -1; }

        .timer-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        #timer-display {
            font-size: 2.5em;
            font-weight: bold;
            font-family: monospace;
            color: var(--secondary-color);
            width: 90px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لعبة بدون كلام 🎭</h1>
        
        <div class="scoreboard">
            <div class="team">
                <h3>فريق 1</h3>
                <div class="score" id="score1">0</div>
                <div class="score-btns">
                    <button class="score-btn" onclick="updateScore(1, 1)">+ صح</button>
                    <button class="score-btn minus" onclick="updateScore(1, -1)">- غلط</button>
                </div>
            </div>
            <div class="team">
                <h3>فريق 2</h3>
                <div class="score" id="score2">0</div>
                <div class="score-btns">
                    <button class="score-btn" onclick="updateScore(2, 1)">+ صح</button>
                    <button class="score-btn minus" onclick="updateScore(2, -1)">- غلط</button>
                </div>
            </div>
        </div>

        <div class="difficulty-section">
            <label class="diff-label" id="lbl-easy" onclick="setDifficulty('easy')">
                <input type="radio" name="difficulty" value="easy"> 🟢 سهل (15ث)
            </label>
            <label class="diff-label active-medium" id="lbl-medium" onclick="setDifficulty('medium')">
                <input type="radio" name="difficulty" value="medium" checked> 🟡 وسط (30ث)
            </label>
            <label class="diff-label" id="lbl-hard" onclick="setDifficulty('hard')">
                <input type="radio" name="difficulty" value="hard"> 🔴 صعب/قديم (45ث)
            </label>
        </div>

        <div class="display-area">
            <div id="category-label">...</div>
            <div id="word-display">مستعد؟</div>
        </div>

        <div class="buttons-grid">
            <button onclick="generateWord('movie')">🎬 فيلم</button>
            <button onclick="generateWord('series')">📺 مسلسل</button>
            <button onclick="generateWord('play')">🎭 مسرحية</button>
            <button class="random-btn" onclick="generateWord('random')">🎲 اختيار عشوائي</button>
        </div>

        <div class="timer-section">
            <button style="background-color: #fca311;" onclick="startTimer()">▶️ ابدأ</button>
            <div id="timer-display">00:30</div>
            <button style="background-color: #e63946; color: white;" onclick="resetTimer()">🔄 إعادة</button>
        </div>
    </div>

    <script>
        // داتا مقسمة حسب الصعوبة والزمن
        const database = {
            movie: {
                easy: ["عسل أسود", "الناظر", "صعيدي في الجامعة الأمريكية", "فول الصين العظيم", "غبي منه فيه", "كدة رضا", "ولاد رزق", "الجزيرة", "البدلة", "نادي الرجال السري", "بوحة", "أسف على الإزعاج", "إكس لارج"],
                medium: ["الكيف", "الإرهاب والكباب", "همام في أمستردام", "تيتو", "كيرة والجن", "الفيل الأزرق", "الممر", "اللمبي", "الكيت كات", "الهروب", "العار", "مافيا", "سلام يا صاحبي"],
                hard: ["غزل البنات", "دعاء الكروان", "إشاعة حب", "الزوجة 13", "ابن حميدو", "شيء من الخوف", "الأرض", "الباب المفتوح", "الكرنك", "الناصر صلاح الدين", "البحث عن فضيحة", "يا رب ولد", "البيضة والحجر"]
            },
            series: {
                easy: ["الكبير أوي", "بـ 100 وش", "موضوع عائلي", "حالة خاصة", "الصفارة", "جعفر العمدة", "العتاولة", "نيللي وشريهان", "سابع جار", "ريفو", "أبو العروسة"],
                medium: ["لن أعيش في جلباب أبي", "عائلة الحاج متولي", "يوميات ونيس", "سجن النسا", "الاختيار", "الحشاشين", "الضوء الشارد", "حديث الصباح والمساء", "عايزة أتجوز"],
                hard: ["ليالي الحلمية", "رأفت الهجان", "المال والبنون", "ذئاب الجبل", "زيزينيا", "البخيل وأنا", "دموع في عيون وقحة", "بوابة الحلواني", "أرابيسك", "العائلة", "الليل وآخره"]
            },
            play: {
                easy: ["مدرسة المشاغبين", "العيال كبرت", "المتزوجون", "الواد سيد الشغال", "مسرح مصر", "ريا وسكينة", "عفروتو", "الزعيم"],
                medium: ["بودي جارد", "سك على بناتك", "كدة أوكيه", "ألابندا", "حزمني يا", "شارع محمد علي", "الجوكر", "تخاريف", "ماما أمريكا"],
                hard: ["سيدتي الجميلة", "السكرتير الفني", "الدخول بالملابس الرسمية", "سكة السلامة", "شاهد ما شافش حاجة", "إلا خمسة", "علشان خاطر عيونك", "الهمجي", "وجهة نظر", "لعبة الست"]
            }
        };

        let currentDifficulty = 'medium';
        let TIME_LIMIT = 30;
        let timeLeft = TIME_LIMIT;
        let timerInterval;
        let scores = { 1: 0, 2: 0 };

        // تغيير الصعوبة
        function setDifficulty(level) {
            currentDifficulty = level;
            
            // تحديث ستايل الأزرار
            document.querySelectorAll('.diff-label').forEach(lbl => {
                lbl.className = 'diff-label';
            });
            document.getElementById('lbl-' + level).classList.add('active-' + level);

            // تحديد الوقت حسب الصعوبة
            if (level === 'easy') TIME_LIMIT = 15;
            if (level === 'medium') TIME_LIMIT = 30;
            if (level === 'hard') TIME_LIMIT = 45;

            resetTimer();
        }

        // تسجيل النقاط
        function updateScore(team, change) {
            scores[team] += change;
            if (scores[team] < 0) scores[team] = 0;
            document.getElementById(`score${team}`).innerText = scores[team];
        }

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generateWord(type) {
            let word = "";
            let label = "";
            
            let actualType = type;
            if (type === 'random') {
                const types = ['movie', 'series', 'play'];
                actualType = types[Math.floor(Math.random() * types.length)];
            }

            word = getRandomItem(database[actualType][currentDifficulty]);

            switch(actualType) {
                case 'movie': label = "🎬 فيلم مصري"; break;
                case 'series': label = "📺 مسلسل مصري"; break;
                case 'play': label = "🎭 مسرحية مصرية"; break;
            }

            document.getElementById('category-label').innerText = label + " (" + (currentDifficulty === 'hard' ? 'قديم/صعب' : currentDifficulty === 'medium' ? 'وسط' : 'سهل وجديد') + ")";
            document.getElementById('word-display').innerText = word;
            
            resetTimer(); 
        }

        function playFunnySound(type) {
            const synth = window.speechSynthesis;
            let text = "";

            if (type === '30') text = "إنجز يا كابتن فاضل نص الوقت!";
            if (type === '15') text = "يا حلاوة.. فاضل خمستاشر ثانية بس!";
            if (type === '5') text = "خمس ثواني يا بطل.. إخلص!";
            if (type === '0') text = "طوووووط.. الوقت خلص يا فاشل!";

            if (text !== "") {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ar-EG'; 
                utterance.rate = 1.1;     
                utterance.pitch = 1.5;    
                synth.speak(utterance);
            }
        }

        function updateTimerDisplay() {
            let seconds = timeLeft % 60;
            document.getElementById('timer-display').innerText = `00:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            window.speechSynthesis.cancel(); 

            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();

                    // تشغيل الأصوات حسب الوقت المتبقي والصعوبة
                    if (TIME_LIMIT === 45) {
                        if (timeLeft === 30) playFunnySound('30');
                        if (timeLeft === 15) playFunnySound('15');
                    } else if (TIME_LIMIT === 30) {
                        if (timeLeft === 15) playFunnySound('15');
                    } else if (TIME_LIMIT === 15) {
                        if (timeLeft === 5) playFunnySound('5');
                    }

                } else {
                    clearInterval(timerInterval);
                    document.getElementById('timer-display').style.color = "#ff6b6b";
                    
                    playFunnySound('0');
                    setTimeout(() => alert("⏰ انتهى الوقت!"), 500);
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = TIME_LIMIT;
            document.getElementById('timer-display').style.color = "var(--secondary-color)";
            updateTimerDisplay();
            window.speechSynthesis.cancel(); 
        }
    </script>
</body>
</html>
